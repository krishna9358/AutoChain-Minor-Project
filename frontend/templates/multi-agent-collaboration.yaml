id: multi-agent-collaboration
name: "Multi-Agent Collaboration"
description: "Multiple AI agents work together to solve complex tasks — one breaks down the problem, others research, analyze, decide, and execute, with human verification at key points."
category: "ai"
icon: "Bot"
version: "2.0.0"
tags:
  - multi-agent
  - ai
  - collaboration
  - complex-tasks
  - autonomous

preview:
  color: "#a855f7"
  estimatedTime: "8 min setup"
  difficulty: "advanced"
  useCases:
    - "Complex research tasks"
    - "Multi-step data analysis"
    - "Autonomous decision-making"
    - "Report generation from multiple sources"

nodes:
  - id: "node-1"
    type: "entry-point"
    name: "Task Input"
    description: "Receives the complex task to be completed"
    position: { x: 100, y: 250 }
    config:
      triggerMode: "manual"
      testRunPlainText: "Research the top 5 competitors in the cloud storage market and create a comparison report with pricing, features, and market share."

  - id: "node-2"
    type: "ai-agent"
    name: "Task Planner"
    description: "Breaks down the complex task into smaller, manageable sub-tasks"
    position: { x: 350, y: 250 }
    config:
      agentType: "planner"
      systemPrompt: "You are a task planning agent. Break down this complex task into 3-5 specific sub-tasks. For each sub-task, specify: what data is needed, what analysis to perform, and what output to produce. Return as structured JSON."
      userPromptTemplate: "{{payload.text}}"
      responseFormat: "json"

  - id: "node-2-model"
    type: "chat-model"
    name: "OpenRouter Chat Model"
    description: "LLM provider for task planning"
    position: { x: 290, y: 390 }
    config:
      provider: "openrouter"
      model: "gpt-4o"
      temperature: 0.3

  - id: "node-3"
    type: "switch-case"
    name: "Route by Complexity"
    description: "Sends each sub-task to the right specialist agent"
    position: { x: 600, y: 250 }
    config:
      switchField: "payload.task_type"
      cases:
        - { value: "research", label: "Data Research" }
        - { value: "analysis", label: "Analysis" }
        - { value: "decision", label: "Decision Making" }

  - id: "node-4"
    type: "data-enrichment"
    name: "Data Retrieval Agent"
    description: "Gathers relevant data from multiple sources"
    position: { x: 850, y: 100 }
    config:
      enrichmentType: "merge"
      sourceField: "payload.research_query"
      outputFields: "market_data\ncompetitor_info\npricing_data"
      aiPrompt: "Research and gather comprehensive data about: {{payload.research_query}}"

  - id: "node-5"
    type: "ai-agent"
    name: "Analysis Agent"
    description: "Analyzes the gathered data and identifies patterns and insights"
    position: { x: 850, y: 250 }
    config:
      agentType: "analyzer"
      systemPrompt: "You are a data analysis agent. Analyze this data and identify: key patterns, trends, strengths/weaknesses, and actionable insights. Provide quantitative comparisons where possible."
      userPromptTemplate: "{{payload.text}}"
      responseFormat: "json"

  - id: "node-5-model"
    type: "chat-model"
    name: "OpenRouter Chat Model"
    description: "LLM provider for data analysis"
    position: { x: 790, y: 390 }
    config:
      provider: "openrouter"
      model: "gpt-4o"
      temperature: 0.3

  - id: "node-6"
    type: "ai-agent"
    name: "Decision Agent"
    description: "Makes recommendations based on the analysis"
    position: { x: 1100, y: 250 }
    config:
      agentType: "planner"
      systemPrompt: "You are a decision-making agent. Based on the research and analysis provided, make clear recommendations. Explain your reasoning, list pros/cons, and provide confidence levels for each recommendation."
      userPromptTemplate: "{{payload.text}}"
      responseFormat: "json"

  - id: "node-6-model"
    type: "chat-model"
    name: "OpenRouter Chat Model"
    description: "LLM provider for decision making"
    position: { x: 1040, y: 390 }
    config:
      provider: "openrouter"
      model: "gpt-4o"
      temperature: 0.3

  - id: "node-7"
    type: "approval"
    name: "Human Verification"
    description: "A human reviews the AI's recommendations before proceeding"
    position: { x: 1350, y: 250 }
    config:
      approvers: "team-lead@company.com"
      message: "Please review the AI-generated recommendations:\n\n{{payload.recommendations}}"
      timeoutMinutes: 2880

  - id: "node-8"
    type: "ai-agent"
    name: "Execution Agent"
    description: "Compiles all findings into a final deliverable"
    position: { x: 1600, y: 250 }
    config:
      agentType: "executor"
      systemPrompt: "Compile all research, analysis, and approved recommendations into a comprehensive, well-structured final report. Include executive summary, detailed findings, recommendations, and next steps."
      userPromptTemplate: "{{payload.text}}"
      responseFormat: "text"

  - id: "node-8-model"
    type: "chat-model"
    name: "OpenRouter Chat Model"
    description: "LLM provider for final report compilation"
    position: { x: 1540, y: 390 }
    config:
      provider: "openrouter"
      model: "gpt-4o"
      temperature: 0.3

  - id: "node-9"
    type: "document-generator"
    name: "Final Report"
    description: "Generates the polished final report document"
    position: { x: 1850, y: 250 }
    config:
      documentType: "report"
      title: "Analysis Report — {{payload.task_title}}"
      template: "{{payload.final_report}}"
      outputFormat: "pdf"
      storeAsArtifact: true

  - id: "node-10"
    type: "audit-log"
    name: "Decision Trail"
    description: "Records every agent decision for transparency and review"
    position: { x: 2100, y: 250 }
    config:
      logLevel: "detailed"
      logCategory: "operational"
      message: "Multi-agent task completed: {{payload.task_title}} — {{payload.agents_used}} agents, {{payload.decisions_made}} decisions"
      includeInputData: true
      retentionDays: 365

edges:
  - { id: "e-1", source: "node-1", target: "node-2" }
  - { id: "e-2", source: "node-2", target: "node-3" }
  - { id: "e-3", source: "node-3", target: "node-4", label: "Research" }
  - { id: "e-4", source: "node-3", target: "node-5", label: "Analysis" }
  - { id: "e-5", source: "node-4", target: "node-5" }
  - { id: "e-6", source: "node-5", target: "node-6" }
  - { id: "e-7", source: "node-6", target: "node-7" }
  - { id: "e-8", source: "node-7", target: "node-8" }
  - { id: "e-9", source: "node-8", target: "node-9" }
  - { id: "e-10", source: "node-9", target: "node-10" }
  # Sub-node connections
  - { id: "s-1", source: "node-2-model", sourceHandle: "model-out", target: "node-2", targetHandle: "chatModel" }
  - { id: "s-2", source: "node-5-model", sourceHandle: "model-out", target: "node-5", targetHandle: "chatModel" }
  - { id: "s-3", source: "node-6-model", sourceHandle: "model-out", target: "node-6", targetHandle: "chatModel" }
  - { id: "s-4", source: "node-8-model", sourceHandle: "model-out", target: "node-8", targetHandle: "chatModel" }
