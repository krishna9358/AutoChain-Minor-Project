version: "3.8"

services:
  # ─── Database ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agentflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: agentflow_dev
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentflow"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - agentflow-network

  # ─── Kafka (for scalable event processing) ───────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: agentflow-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - zkdata:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agentflow-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: agentflow-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    ports:
      - "9094:9094"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - agentflow-network

  # ─── Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./primary-backend
      dockerfile: Dockerfile.dev
    container_name: agentflow-backend
    restart: unless-stopped
    env_file:
      - ./primary-backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:agentflow_dev@postgres:5432/agentflow
      JWT_SECRET: agentflow-dev-secret-key
      PORT: "3001"
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./primary-backend/src:/app/src
      - ./primary-backend/prisma:/app/prisma
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agentflow-network

  # ─── Hooks (Webhook Receiver) ─────────────────────────────────────────────
  hooks:
    build:
      context: ./hooks
      dockerfile: Dockerfile.dev
    container_name: agentflow-hooks
    restart: unless-stopped
    env_file:
      - ./hooks/.env
    environment:
      DATABASE_URL: postgresql://postgres:agentflow_dev@postgres:5432/agentflow
      PORT: "3002"
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
    ports:
      - "3002:3002"
    volumes:
      - ./hooks/src:/app/src
      - ./hooks/prisma:/app/prisma
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agentflow-network

  # ─── Processor (Outbox → Kafka) ──────────────────────────────────────────
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile.dev
    container_name: agentflow-processor
    restart: unless-stopped
    env_file:
      - ./processor/.env
    environment:
      DATABASE_URL: postgresql://postgres:agentflow_dev@postgres:5432/agentflow
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
      PROCESSOR_INTERVAL: 5000
    volumes:
      - ./processor/src:/app/src
      - ./processor/prisma:/app/prisma
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agentflow-network

  # ─── Worker (Kafka Consumer → Execute Actions) ───────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    container_name: agentflow-worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      DATABASE_URL: postgresql://postgres:agentflow_dev@postgres:5432/agentflow
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
      WORKER_CONCURRENCY: 5
    volumes:
      - ./worker/src:/app/src
      - ./worker/prisma:/app/prisma
      - /app/node_modules
      - /app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agentflow-network

  # ─── Frontend (Next.js Dev) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: agentflow-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      NEXT_PUBLIC_DEV_MODE: "true"
      NEXT_PUBLIC_DEV_TOKEN: dev-demo-token
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - /app/.next
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentflow-network

volumes:
  pgdata:
    driver: local
  kafkadata:
    driver: local
  zkdata:
    driver: local

networks:
  agentflow-network:
    driver: bridge
