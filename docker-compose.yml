services:
  # ─── Database ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: autochain-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autochain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: autochain_dev
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autochain"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - autochain-network

  # ─── Kafka (for scalable event processing) ───────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: autochain-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zkdata:/var/lib/zookeeper/data
      - zklogs:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - autochain-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: autochain-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "9094:9094"
    volumes:
      - kafkadata:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - autochain-network

  # ─── Backend API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./primary-backend
      dockerfile: Dockerfile.dev
    container_name: autochain-backend
    restart: unless-stopped
    env_file:
      - ./primary-backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:autochain_dev@postgres:5432/autochain
      JWT_SECRET: autochain-dev-secret-key
      PORT: "3001"
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
      ENCRYPTION_KEY: autochain-dev-encryption-key-32ch
    ports:
      - "3001:3001"
    volumes:
      - ./primary-backend/src:/app/src
      - ./primary-backend/prisma:/app/prisma
      - ./primary-backend/tsconfig.json:/app/tsconfig.json
      - backend_node_modules:/app/node_modules
      - backend_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - autochain-network

  # ─── Hooks (Webhook Receiver) ─────────────────────────────────────────────
  hooks:
    build:
      context: ./hooks
      dockerfile: Dockerfile.dev
    container_name: autochain-hooks
    restart: unless-stopped
    env_file:
      - ./hooks/.env
    environment:
      DATABASE_URL: postgresql://postgres:autochain_dev@postgres:5432/autochain
      PORT: "3002"
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
    ports:
      - "3002:3002"
    volumes:
      - ./hooks/src:/app/src
      - ./hooks/prisma:/app/prisma
      - hooks_node_modules:/app/node_modules
      - hooks_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - autochain-network

  # ─── Processor (Outbox → Kafka) ──────────────────────────────────────────
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile.dev
    container_name: autochain-processor
    restart: unless-stopped
    env_file:
      - ./processor/.env
    environment:
      DATABASE_URL: postgresql://postgres:autochain_dev@postgres:5432/autochain
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
      PROCESSOR_INTERVAL: 5000
    volumes:
      - ./processor/src:/app/src
      - ./processor/prisma:/app/prisma
      - processor_node_modules:/app/node_modules
      - processor_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - autochain-network

  # ─── Worker (Kafka Consumer → Execute Actions) ───────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    container_name: autochain-worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      DATABASE_URL: postgresql://postgres:autochain_dev@postgres:5432/autochain
      KAFKA_BROKER: kafka:9092
      NODE_ENV: development
      WORKER_CONCURRENCY: 5
    volumes:
      - ./worker/src:/app/src
      - ./worker/prisma:/app/prisma
      - worker_node_modules:/app/node_modules
      - worker_dist:/app/dist
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - autochain-network

  # ─── Frontend (Next.js Dev) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: autochain-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:3001
      NEXT_PUBLIC_DEV_MODE: "true"
      NEXT_PUBLIC_DEV_TOKEN: dev-demo-token
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/store:/app/store
      - ./frontend/hooks:/app/hooks
      - ./frontend/public:/app/public
      - frontend_next:/app/.next
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - autochain-network

volumes:
  pgdata:
    driver: local
  kafkadata:
    driver: local
  zkdata:
    driver: local
  zklogs:
    driver: local
  backend_node_modules:
    driver: local
  backend_dist:
    driver: local
  hooks_node_modules:
    driver: local
  hooks_dist:
    driver: local
  processor_node_modules:
    driver: local
  processor_dist:
    driver: local
  worker_node_modules:
    driver: local
  worker_dist:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

networks:
  autochain-network:
    driver: bridge
